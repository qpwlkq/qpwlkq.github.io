name: Build and publish site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        env:
          SITE_URL: https://qpwlkq.github.io
        run: npm run build

      - name: Publish dist to master
        shell: bash
        run: |
          set -euo pipefail
          touch dist/.nojekyll
          tmp_dir="$(mktemp -d)"
          cp -R dist/. "$tmp_dir/"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan pages-deploy
          git rm -rf .
          cp -R "$tmp_dir"/. .
          git add .
          git commit -m "Deploy site"
          git push --force origin pages-deploy:master
